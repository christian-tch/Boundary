apiVersion: v1
kind: ConfigMap
metadata:
  name: ssh-vault-ca
  namespace: boundary
data:
  # After `terraform apply`, update this with the generated CA key:
  #
  #   kubectl create configmap ssh-vault-ca -n boundary \
  #     --from-literal=trusted-user-ca-keys.pem="$(terraform -chdir=terraform/boundary-config output -raw vault_ssh_ca_public_key)" \
  #     --dry-run=client -o yaml | kubectl apply -f -
  #
  # Then restart the SSH pod: kubectl rollout restart deployment/ssh-target -n boundary
  trusted-user-ca-keys.pem: |
    REPLACE_WITH_VAULT_CA_PUBLIC_KEY
