apiVersion: v1
kind: Service
metadata:
  name: ssh-target
  namespace: boundary
  labels:
    app: ssh-target
spec:
  # ClusterIP uniquement : pas d'exposition directe hors du cluster
  # L'accès se fait exclusivement via le worker Boundary
  type: ClusterIP
  selector:
    app: ssh-target
  ports:
    - name: ssh
      port: 2222
      targetPort: 2222
      protocol: TCP
