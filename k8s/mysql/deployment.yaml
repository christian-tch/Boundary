apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: boundary
  labels:
    app: mysql
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          # mysql_native_password is required for Vault's Go MySQL driver to authenticate
          command: ["--default-authentication-plugin=mysql_native_password"]
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: root-password
            - name: MYSQL_DATABASE
              value: "demo"
          ports:
            - containerPort: 3306
              name: mysql
